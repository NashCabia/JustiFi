<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiFi | Student Dashboard</title>
  <link rel="stylesheet" href="dash.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">
      <img class="brand-logo" src="Images/logo.png" alt="JustiFi logo" />
    </a>

    <div class="topbar-right">
      <span class="welcome">Welcome, <strong id="navUserName">Student</strong></span>

      <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
        ☰
      </button>
    </div>
  </header>

  <div id="menuOverlay" class="menu-overlay hidden"></div>

  <aside id="sideMenu" class="side-menu">
    <div class="side-menu-header">
      <h3>Menu</h3>
      <button id="closeMenuBtn" class="close-menu-btn" type="button">✕</button>
    </div>

    <div class="side-menu-body">
      <button class="menu-link" onclick="goToProfile()">Profile</button>
      <button class="menu-link" onclick="goToBadges()">Badges</button>
      <button class="menu-link logout-btn" onclick="logoutUser()">Logout</button>
    </div>
  </aside>

  <div class="back-row">
    <a class="back-btn" href="../../../index.html">Back</a>
  </div>

  <main class="dashboard-shell">
    <section class="hero-card">
      <p class="eyebrow">JUSTIFI STUDENT DASHBOARD</p>
      <h1>Hello, <span id="heroUserName">Student</span></h1>
      <p class="hero-subtext">
        Learn legal rights through interactive stories and keep track of your overall progress.
      </p>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Lessons</span>
        <strong class="stat-value" id="lessonCount">00</strong>
      </div>

      <div class="stat-card">
        <span class="stat-label">Badges</span>
        <strong class="stat-value" id="badgeCount">00</strong>
      </div>

      <div class="stat-card">
        <span class="stat-label">Average</span>
        <strong class="stat-value" id="quizAverage">0%</strong>
      </div>
    </section>

    <section class="content-grid">
      <section class="content-card">
        <p class="card-kicker">QUICK ACCESS</p>
        <h2>Main Sections</h2>

        <div class="action-grid">
          <button class="feature-card" onclick="goToProfile()">
            <h3>Profile</h3>
            <p>View your personal information and learning record.</p>
          </button>

          <button class="feature-card" onclick="goToBadges()">
            <h3>Badges</h3>
            <p>See your earned achievements and rewards.</p>
          </button>
        </div>
      </section>

      <section class="content-card chart-card">
        <p class="card-kicker">PROGRESS OVERVIEW</p>
        <h2>Learning Progress</h2>
        <div class="mini-chart-wrap">
          <canvas id="dashboardProgressChart"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script src="../../../JS/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../JS/firebase-service.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../../JS/session-manager.js"></script>
  <script src="dash.js"></script>
  
</body>
</html>
