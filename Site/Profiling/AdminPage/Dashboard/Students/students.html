<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiFi | Student List</title>
  <link rel="stylesheet" href="students.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">
      <img class="brand-logo" src="../../Images/logo.png" alt="JustiFi logo" />
    </a>

    <div class="topbar-right">
      <span class="welcome">Welcome, <strong id="navUserName">Admin</strong></span>

      <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
        ☰
      </button>
    </div>
  </header>

  <div id="menuOverlay" class="menu-overlay hidden"></div>

  <aside id="sideMenu" class="side-menu">
    <div class="side-menu-header">
      <h3>Menu</h3>
      <button id="closeMenuBtn" class="close-menu-btn" type="button">✕</button>
    </div>

    <div class="side-menu-body">
      <button class="menu-link" onclick="goToDashboard()">Dashboard</button>
      <button class="menu-link" onclick="goToProfile()">Profile</button>
      <button class="menu-link logout-btn" onclick="logoutUser()">Logout</button>
    </div>
  </aside>

  <div class="back-row">
    <a class="back-btn" href="../admindash.html">Back</a>
  </div>

  <main class="students-shell">
    <section class="hero-card">
      <p class="eyebrow">STUDENT LIST</p>
      <h1>Registered Students</h1>
      <p class="hero-subtext">
        Select a student from the list below to view their learning progress, scores, and achievements.
      </p>
    </section>

    <section class="list-card">
      <div class="list-header">
        <h2>Students</h2>
        <input
          type="text"
          id="studentSearch"
          class="search-input"
          placeholder="Search student..."
        />
      </div>

      <div id="student-list" class="student-list">
        <!-- Student cards go here -->
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../../JS/firebase-config.js"></script>
  <script src="../../../../JS/firebase-service.js"></script>
  <script src="../../../../JS/app-core.js"></script>
  <script src="students.js"></script>
</body>
</html>
