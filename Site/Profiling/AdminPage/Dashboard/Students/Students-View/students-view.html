<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiFi | Student Progress</title>
  <link rel="stylesheet" href="../students.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">
            <h1 class="brand-logo">JustiFi</h1>

    </a>

    <div class="topbar-right">
      <a class="manage-link" href="../Manage/manage-students.html">Student View</a>
    </div>
  </header>

  <!-- Removed slide-out menu; top-right now links to Manage Students -->

  <div class="back-row">
    <a class="back-btn" href="../students.html">Back</a>
  </div>

  <main class="students-shell">
    <section class="hero-card">
      <p class="eyebrow">STUDENT PROGRESS</p>
      <h1 id="student-name">Student Name</h1>
      <p class="hero-subtext">
        This page shows the selected student’s progress, scores, and achievements.
      </p>
    </section>

    <section class="list-card">
      <div class="list-header">
        <h2>Progress Overview</h2>
      </div>

      <div class="stats-grid-progress">
        <div class="progress-mini-card">
          <span class="mini-label">Completed Lessons</span>
          <strong id="completedLessons">0</strong>
        </div>

        <div class="progress-mini-card">
          <span class="mini-label">Badges Earned</span>
          <strong id="badgeCount">0</strong>
        </div>

        <div class="progress-mini-card">
          <span class="mini-label">Quiz Average</span>
          <strong id="quizAverage">0%</strong>
        </div>
      </div>

      <div class="chart-box">
        <canvas id="progressChart"></canvas>
      </div>
    </section>
  </main>

  <div id="floatingPanel" class="floating-panel hidden">
  <span id="floatingPanelMessage"></span>
</div>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../../../JS/firebase-config.js"></script>
  <script src="../../../../../JS/firebase-service.js"></script>
  <script src="../../../../../JS/session-manager.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="view.js"></script>
  <script src="../../../../../JS/sticky-pin.js"></script>
</body>
</html>
