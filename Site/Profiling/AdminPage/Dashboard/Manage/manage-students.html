<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustiFi | Manage Students</title>
  <link rel="stylesheet" href="manage-students.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../admindash.html">
            <h1 class="brand-logo">JustiFi</h1>

    </a>

    <div class="topbar-right">
      <span class="welcome">Manage Students</span>
    </div>
  </header>

  <div class="back-row">
    <a class="back-btn" href="../admindash.html">Back</a>
  </div>

  <main class="page-shell">
    <section class="hero-card">
      <p class="eyebrow">ADMIN MANAGEMENT</p>
      <h1>Manage Students</h1>
      <p class="hero-subtext">Edit student grade levels, sections, and other academic information.</p>
    </section>

    <!-- Search & Filter Section -->
    <section class="panel-card">
      <div class="panel-head">
        <h2>Find Student</h2>
      </div>

      <div class="search-filter-section">
        <div class="search-box">
          <input class="search-input" type="text" id="searchInput" placeholder="Search by name or email..." />
          <button class="search-btn" type="button" aria-label="Search">Search</button>
        </div>
        
        <div class="filter-box">
          <label for="gradeFilter">Filter by Grade:</label>
          <select class="grade-select" id="gradeFilter">
            <option value="">All Grades</option>
            <option value="Grade 11">Grade 11</option>
            <option value="Grade 12">Grade 12</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Students List -->
    <section class="panel-card">
      <div class="panel-head">
        <h2>Students</h2>
        <span id="studentCount" class="student-count">0 students</span>
      </div>

      <div id="studentsList" class="students-list"></div>
      <div id="emptyState" class="empty-state" style="display: none;">
        <p>No students found. Try adjusting your search or filter.</p>
      </div>
    </section>

    <!-- Edit Form -->
    <div id="editFormModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Edit Student - <span id="studentNameDisplay"></span></h2>
          <button class="close-btn" type="button">✕</button>
        </div>

        <form id="editStudentForm" class="edit-form">
          <div class="form-group">
            <label for="editEmail">Email:</label>
            <input type="email" id="editEmail" readonly />
          </div>

          <div class="form-group">
            <label for="editFirstName">First Name:</label>
            <input type="text" id="editFirstName" />
          </div>

          <div class="form-group">
            <label for="editLastName">Last Name:</label>
            <input type="text" id="editLastName" />
          </div>

          <div class="form-group">
            <label for="editGradeLevel">Grade Level:</label>
            <select id="editGradeLevel">
              <option value="Grade 11">Grade 11</option>
              <option value="Grade 12">Grade 12</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editSection">Section:</label>
            <input type="text" id="editSection" placeholder="Example: Section A" />
          </div>

          <div class="form-group">
            <label for="editSchool">School:</label>
            <input type="text" id="editSchool" />
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Changes</button>
            <button class="btn btn-secondary" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    
    <div id="floatingPanel" class="floating-panel hidden">
      <span id="floatingPanelMessage"></span>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../../JS/firebase-config.js"></script>
  <script src="../../../../JS/firebase-service.js"></script>
  <script src="../../../../JS/app-core.js"></script>
  <script src="../../../../JS/session-manager.js"></script>
  <script src="manage-students.js"></script>
</body>
</html>
