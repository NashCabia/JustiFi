<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Announcement</title>
  <link rel="stylesheet" href="../CSS/update-announcement.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">
      <h1 class="brand-logo">JustiFi</h1>
    </a>
    <div class="topbar-right">
      <span class="welcome">Announcements</span>
    </div>
  </header>

  <div class="back-row">
    <a class="back-btn" href="../developer.html">Back</a>
  </div>

  <main class="page-shell">
    <section class="hero-card">
      <p class="eyebrow">DEVELOPER TOOL</p>
      <h1>Update Announcement</h1>
      <p class="hero-subtext">Create, edit, or remove system-wide announcements that will appear on the homepage.</p>
    </section>

    <!-- Add/Edit Form Section -->
    <section class="panel-card">
      <div class="panel-head">
        <h2 id="formTitle">Add New Announcement</h2>
        <button id="resetFormBtn" class="reset-btn" style="display: none;" type="button">✕ Cancel</button>
      </div>

      <form id="announcementForm" class="announcement-form">
        <div class="form-group">
          <label for="announcementTitle">Title *</label>
          <input type="text" id="announcementTitle" placeholder="Enter announcement title" required />
        </div>

        <div class="form-group">
          <label for="announcementDescription">Description *</label>
          <textarea id="announcementDescription" placeholder="Enter announcement details" rows="5" required>• </textarea>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="submitBtn" type="submit">Add Announcement</button>
          <button class="btn btn-secondary" id="resetFormBtn2" type="button">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Announcements List Section -->
    <section class="panel-card">
      <div class="panel-head">
        <h2>Current Announcements</h2>
        <span id="announcementCount" class="announcement-count">0 announcements</span>
      </div>

      <div id="announcementsList" class="announcements-list"></div>
      <div id="emptyState" class="empty-state">
        <p>No announcements yet. Create one to get started!</p>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../../JS/firebase-config.js"></script>
  <script src="../../../../JS/firebase-service.js"></script>
  <script src="../../../../JS/app-core.js"></script>
  <script src="../../JS/update-announcement.js"></script>
  <script src="../../../../JS/sticky-pin.js"></script>
</body>
</html>
