<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assign Roles</title>
  <link rel="stylesheet" href="../CSS/assign-roles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">
      <h1 class="brand-logo">JustiFi</h1>
    </a>
    <div class="topbar-right">
      <span class="welcome">Assign Roles</span>
    </div>
  </header>

  <div class="back-row">
    <a class="back-btn" href="../developer.html">Back</a>
  </div>

  <main class="page-shell">
    <section class="hero-card">
      <p class="eyebrow">DEVELOPER TOOL</p>
      <h1>Assign Roles</h1>
      <p class="hero-subtext">Update a user account role. Works with local demo data now and Firebase when configured.</p>
    </section>

    <section class="panel-card">
      <div class="panel-head">
        <h2>Assign Roles</h2>
      </div>

      <!-- Search and Filter Section -->
      <div class="search-filter-section">
        <div class="search-box">
          <input class="search-input" type="text" id="searchInput" placeholder="Search by email or name..." />
          <button class="search-btn" type="button" aria-label="Search">Search</button>
        </div>
        
        <div class="filter-box">
          <label for="roleFilter">Filter by Role:</label>
          <select class="role-select" id="roleFilter">
            <option value="">All Roles</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="developer">Developer</option>
          </select>
        </div>
      </div>

      <!-- Users List -->
      <div class="users-list-container">
        <div id="usersList" class="users-list"></div>
        <div id="noUsersMessage" class="no-users-message" style="display: none;">
          <p>No users found. Try adjusting your search or filter.</p>
        </div>
      </div>

      <!-- Role Assignment Form -->
      <div id="roleAssignmentForm" class="role-assignment-form hidden">
        <div class="form-header">
          <h3>Update Role for <span id="selectedUserName"></span></h3>
          <button class="close-form-btn" type="button">✕</button>
        </div>

        <div class="form-content">
          <div class="form-field">
            <label for="selectedEmail">Email:</label>
            <input type="email" id="selectedEmail" readonly />
          </div>

          <div class="form-field">
            <label for="newRole">New Role:</label>
            <select id="newRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="developer">Developer</option>
            </select>
          </div>

          <div class="form-field" id="gradeField" style="display: none;">
            <label for="newGradeLevel">Grade Level (for teachers):</label>
            <input type="text" id="newGradeLevel" placeholder="Example: Grade 10" />
          </div>

          <div class="form-field" id="sectionField" style="display: none;">
            <label for="newSection">Section (for teachers):</label>
            <input type="text" id="newSection" placeholder="Example: Section A" />
          </div>

          <button class="assign-btn" id="submitRoleBtn" type="button">Update Role</button>
        </div>
      </div>

      <div class="status-note">Search and select a user to update their role.</div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
  <script src="../../../../JS/firebase-config.js"></script>
  <script src="../../../../JS/firebase-service.js"></script>
  <script src="../../../../JS/app-core.js"></script>
  <script src="../../JS/dev.js"></script>
  <script src="../../../../JS/sticky-pin.js"></script>
</body>
</html>
